services:
  - type: web
    name: pytestgenie-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app_unified:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONWARNINGS
        value: ignore::FutureWarning
      - key: CORS_ORIGINS
        value: "*"
