<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Smells Analysis Report</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
	:root {
		--primary-color: #6366f1;
		--secondary-color: #8b5cf6;
		--success-color: #10b981;
		--error-color: #ef4444;
		--dark-bg: #0f172a;
		--card-bg: #1e293b;
		--text-primary: #f1f5f9;
		--text-secondary: #94a3b8;
		--border-color: #334155;
	}
	
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}
	
	body {
		font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
		color: var(--text-primary);
		line-height: 1.6;
		padding: 2rem;
	}
	
	.container {
		max-width: 1400px;
		margin: 0 auto;
	}
	
	.header {
		text-align: center;
		padding: 3rem 0;
		margin-bottom: 2rem;
		background: var(--card-bg);
		border-radius: 20px;
		border: 1px solid var(--border-color);
	}
	
	.header-icon {
		font-size: 4rem;
		color: var(--primary-color);
		margin-bottom: 1rem;
	}
	
	h1 {
		font-size: 2.5rem;
		background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		background-clip: text;
		margin-bottom: 1rem;
	}
	
	.summary-box {
		background: var(--card-bg);
		padding: 2rem;
		border-radius: 16px;
		margin-bottom: 2rem;
		border: 1px solid var(--border-color);
	}
	
	.summary-title {
		font-size: 1.5rem;
		color: var(--text-primary);
		margin-bottom: 1rem;
		display: flex;
		align-items: center;
		gap: 0.5rem;
	}
	
	.summary-stats {
		font-size: 1.2rem;
		color: var(--text-secondary);
		margin-bottom: 1.5rem;
	}
	
	.file-list {
		list-style: none;
		padding: 0;
	}
	
	.file-list li {
		background: rgba(99, 102, 241, 0.1);
		padding: 0.75rem 1rem;
		margin: 0.5rem 0;
		border-radius: 8px;
		border-left: 4px solid var(--primary-color);
		display: flex;
		align-items: center;
		gap: 0.5rem;
	}
	
	.file-list li i {
		color: var(--primary-color);
	}
	
	.smell-badge {
		background: var(--error-color);
		color: white;
		padding: 0.25rem 0.75rem;
		border-radius: 20px;
		font-size: 0.9rem;
		font-weight: 600;
		margin-left: auto;
	}
	
	.test-file-section {
		background: var(--card-bg);
		border-radius: 16px;
		padding: 2rem;
		margin-bottom: 2rem;
		border: 1px solid var(--border-color);
	}
	
	.file-header {
		margin-bottom: 1.5rem;
		padding-bottom: 1rem;
		border-bottom: 2px solid var(--border-color);
	}
	
	.file-name {
		font-size: 1.3rem;
		color: var(--primary-color);
		margin-bottom: 0.5rem;
		display: flex;
		align-items: center;
		gap: 0.5rem;
	}
	
	.file-path {
		font-size: 0.9rem;
		color: var(--text-secondary);
		font-family: 'Courier New', monospace;
	}
	
	.no-smells {
		text-align: center;
		padding: 2rem;
		color: var(--success-color);
		font-size: 1.1rem;
	}
	
	.no-smells i {
		font-size: 3rem;
		display: block;
		margin-bottom: 1rem;
	}
	
	table {
		width: 100%;
		border-collapse: collapse;
		background: rgba(15, 23, 42, 0.5);
		border-radius: 12px;
		overflow: hidden;
	}
	
	thead {
		background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
	}
	
	th {
		padding: 1rem;
		text-align: left;
		font-weight: 600;
		color: white;
		text-transform: uppercase;
		font-size: 0.85rem;
		letter-spacing: 0.5px;
	}
	
	tbody tr {
		border-bottom: 1px solid var(--border-color);
		transition: background 0.2s;
	}
	
	tbody tr:hover {
		background: rgba(99, 102, 241, 0.1);
	}
	
	tbody tr:last-child {
		border-bottom: none;
	}
	
	td {
		padding: 1rem;
		color: var(--text-secondary);
	}
	
	td:first-child {
		color: var(--text-primary);
		font-weight: 600;
		text-align: center;
	}
	
	td:nth-child(2) {
		color: var(--error-color);
		font-weight: 600;
	}
	
	.divider {
		height: 2px;
		background: linear-gradient(90deg, transparent, var(--border-color), transparent);
		margin: 2rem 0;
	}
	
	@media (max-width: 768px) {
		body { padding: 1rem; }
		h1 { font-size: 2rem; }
		table { font-size: 0.9rem; }
		th, td { padding: 0.75rem; }
	}
</style>
</head>
<body>
<div class="container">
	<div class="header">
		<i class="fas fa-flask header-icon"></i>
		<h1>Test Smells Analysis Report</h1>
	</div>
	
	<div class="summary-box">
		<div class="summary-title">
			<i class="fas fa-chart-bar"></i>
			Analysis Summary
		</div>
		<div class="summary-stats"><strong>2</strong> test smells found in <strong>1</strong> python test file</div>
		<ul class="file-list">
		<li><i class="fas fa-file-code"></i>generated_test.py<span class="smell-badge">2 smells</span></li>
	</ul>
	</div>
	<div class='divider'></div><div class="test-file-section">
	<div class="file-header">
		<div class="file-name"><i class="fas fa-file-code"></i>generated_test.py</div>
		<div class="file-path"><i class="fas fa-folder"></i> </div>
	</div>
	<table>
		<thead>
			<tr>
				<th style="width: 5%">#</th>
				<th style="width: 25%">Test Smell Type</th>
				<th style="width: 50%">Method Name</th>
				<th style="width: 20%">Line Numbers</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>1</td>
				<td>Unknown Test</td>
				<td>test_case_0</td>
				<td>8</td>
			</tr>
		</tbody>
		<tbody>
			<tr>
				<td>2</td>
				<td>Unknown Test</td>
				<td>test_case_1</td>
				<td>13</td>
			</tr>
		</tbody>

	</table>
</div>
<div class="divider"></div>
</div>
</body>
</html>
